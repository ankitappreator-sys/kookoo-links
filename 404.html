<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening KooKoo…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #58a6ff;
    }
    p {
      font-size: 15px;
      color: #8b949e;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #238636;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn:hover { background: #2ea043; }
    .store-links {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .store-link {
      font-size: 13px;
      color: #58a6ff;
      text-decoration: none;
    }
    .store-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐦</div>
    <h1>Opening KooKoo</h1>
    <p id="msg">Redirecting you to the KooKoo app…</p>
    <button class="btn" id="openBtn" onclick="openApp()">Open in KooKoo</button>
    <div class="store-links">
      <a class="store-link" id="playStoreLink" href="https://play.google.com/store/apps/details?id=in.co.kookoo" target="_blank">Get on Android</a>
      <a class="store-link" id="appStoreLink" href="https://apps.apple.com/app/kookoo/id6741440498" target="_blank">Get on iOS</a>
    </div>
  </div>

  <script>
    // ── Parse the path to extract type and id ──────────────────────────────
    // GitHub Pages 404.html receives the original path in window.location.pathname
    // e.g. /kookoo-links/user/abc123  or  /kookoo-links/video/xyz789
    var path = window.location.pathname; // e.g. "/kookoo-links/user/abc123"
    var segments = path.replace(/^\//, '').split('/');
    // segments[0] = "kookoo-links", segments[1] = "user"|"video", segments[2] = id
    var type = segments[1] || '';   // "user" or "video"
    var id   = segments[2] || '';   // the actual user/video id

    var deepLink = '';

    if (type === 'user' && id) {
      deepLink = 'kookoo://user/' + id;
      document.getElementById('msg').textContent =
        'Opening profile in the KooKoo app…';
    } else if (type === 'video' && id) {
      deepLink = 'kookoo://video/' + id;
      document.getElementById('msg').textContent =
        'Opening video in the KooKoo app…';
    } else {
      document.getElementById('msg').textContent =
        'This link will open in the KooKoo app.';
    }

    function openApp() {
      if (!deepLink) return;
      window.location.href = deepLink;
    }

    // Auto-redirect after a short delay so the page is visible briefly
    if (deepLink) {
      setTimeout(function () {
        window.location.href = deepLink;
      }, 800);
    }
  </script>
</body>
</html>
