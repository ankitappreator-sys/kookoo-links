<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KooKoo – Create · Discover · Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 800; color: #58a6ff; margin-bottom: 8px; }
    .tagline { font-size: 13px; letter-spacing: 2px; color: #8b949e; margin-bottom: 24px; }
    p { font-size: 15px; color: #8b949e; line-height: 1.5; margin-bottom: 28px; }
    .store-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .store-link {
      display: inline-block;
      background: #238636;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      text-decoration: none;
    }
    .store-link:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐦</div>
    <h1>KooKoo</h1>
    <p class="tagline">CREATE · DISCOVER · CONNECT</p>
    <p>Short-form video for everyone. Download the app to watch, create, and share.</p>
    <div class="store-links">
      <a class="store-link" href="https://play.google.com/store/apps/details?id=in.co.kookoo" target="_blank">Android</a>
      <a class="store-link" href="https://apps.apple.com/app/kookoo/id6741440498" target="_blank">iOS</a>
    </div>
  </div>
</body>
</html>
