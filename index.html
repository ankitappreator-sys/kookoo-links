<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KooKoo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 80px; margin-bottom: 20px; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
    p { color: #888; font-size: 17px; margin-bottom: 40px; }
    .btn {
      display: inline-block;
      background: #6c63ff;
      color: white;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      margin: 8px;
    }
  </style>
</head>
<body>
  <div class="icon">🐦</div>
  <h1>KooKoo</h1>
  <p>Share and discover amazing short videos</p>
  <a class="btn" href="https://play.google.com/store/apps/details?id=in.co.kookoo">
    Get on Android
  </a>
  <a class="btn" href="https://apps.apple.com/in/app/id6446690009">
    Get on iOS
  </a>
</body>
</html>
